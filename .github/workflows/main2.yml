name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Android SDK vorab auf dem Server bereitstellen
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          build-tools-version: '34.0.0'

      # FIX: Alle Google Android-Lizenzen vorab via Skript automatisch akzeptieren
      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 2. System-Abhängigkeiten installieren (inklusive aidl)
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      # 3. Build mit gesetzten SDK-Pfaden ausführen
      - name: Build Android APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
