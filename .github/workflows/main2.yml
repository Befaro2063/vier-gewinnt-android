name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext
          
          # FIX: aidl systemweit installieren und für buildozer global verknüpfen
          sudo apt-get install -y aidl
          sudo ln -s /usr/bin/aidl /usr/local/bin/aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      - name: Build Android APK
        run: |
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
