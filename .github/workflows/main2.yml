name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      - name: Prepare Android SDK Paths (Fix AIDL Error)
        run: |
          # Wir stoßen den SDK-Download von Buildozer kurz an, damit die Ordner existieren
          buildozer android p4a -- get-targets || true
          
          # Wir suchen, wo Google das neue aidl versteckt hat, und verknüpfen es an den alten Ort
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          if [ -d "$SDK_DIR" ]; then
            echo "Android SDK gefunden. Erstelle AIDL-Bypass..."
            # Findet die installierte Build-Tools Version dynamisch
            BUILD_TOOLS_DIR=$(ls -d $SDK_DIR/build-tools/* 2>/dev/null | head -n 1)
            if [ -n "$BUILD_TOOLS_DIR" ]; then
              sudo cp /usr/bin/aidl $BUILD_TOOLS_DIR/ 2>/dev/null || true
              # Falls im System kein aidl ist, nutzen wir das aus den build-tools und verknüpfen es für p4a
              sudo ln -s $BUILD_TOOLS_DIR/aidl /usr/local/bin/aidl 2>/dev/null || true
            fi
          fi

      - name: Build Android APK
        run: |
          # Jetzt läuft der echte Build durch, da alle Pfade vorbereitet sind
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
