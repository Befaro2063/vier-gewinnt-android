name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. System-Abhängigkeiten installieren (Hier nutzen wir KEIN vorinstalliertes GitHub-SDK mehr)
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      # 2. Reinen, sauberen Build ohne Pfad-Konflikte ausführen
      - name: Build Android APK
        run: |
          # Wir löschen die kollidierenden Systemvariablen von GitHub, damit Buildozer absolut sauber baut
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          
          # Startet den isolierten Build
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
