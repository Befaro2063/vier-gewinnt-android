name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl build-essential libsqlite3-dev lld libjpeg-dev

      - name: Install Buildozer and Cython core tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython>=0.29,<3.0" buildozer

      - name: Build Android APK
        run: |
          # 1. RADIKALE BEREINIGUNG: Löscht alle fehlerhaften Cache-Ordner des Servers
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # 2. Umgebungsvariablen von GitHub säubern
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          
          # 3. Compiler-Flags für stabilen C-Build setzen
          export CFLAGS="-O2 -fcommon"
          export CXXFLAGS="-O2 -fcommon"
          
          # 4. Sauberen Build erzwingen
          buildozer android debug
