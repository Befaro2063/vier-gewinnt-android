name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Android SDK vorab auf dem Server bereitstellen
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          build-tools-version: '34.0.0'

      # 2. System-Abhängigkeiten installieren (inklusive aidl)
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      # 3. Vorbereitungs-Schritt: Lizenzen für BEIDE SDK-Pfade im Voraus abnicken
      - name: Force Accept All Android Licenses
        run: |
          # 1. Globales GitHub-SDK abnicken
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 2. Lokale Buildozer-Ordnerstruktur vorab erzwingen und dort die Lizenzen hinterlegen
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # Kopiert die bereits akzeptierten Lizenzen direkt in das Buildozer-Verzeichnis
          if [ -d "$ANDROID_HOME/licenses" ]; then
            cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          fi

      # 4. Build ausführen und Buildozer die korrekten System-Pfade aufzwingen
      - name: Build Android APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          # Zwingt p4a (python-for-android) das bereits installierte SDK zu nutzen
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
