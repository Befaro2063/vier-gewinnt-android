name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Android SDK mit aktuellen commandline-tools bereitstellen
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
          packages: 'build-tools;34.0.0 platforms;android-34 platform-tools tools ndk;25.2.9519653'

      # 2. System-Abhängigkeiten für Buildozer auf dem Ubuntu-Server installieren
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      # 3. KORREKTUR: Pfad-Bypass für den Google sdkmanager einrichten
      - name: Fix Sdkmanager and License Paths for Buildozer
        run: |
          # Buildozer-Struktur im Vorfeld erzwingen, damit p4a nicht scheitert
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # Kopiert die funktionierenden GitHub-Lizenzen in das lokale Buildozer-Verzeichnis
          if [ -d "$ANDROID_HOME/licenses" ]; then
            cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          fi
          
          # Erstellt die von Buildozer gesuchte alte Ordnerstruktur als Verknüpfung auf die neuen cmdline-tools
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          fi

      # 4. Den Build mit erzwungenen globalen Umgebungsvariablen starten
      - name: Build Android APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
