name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    # KORREKTUR: Zurück auf aktuelle, aktive Server wechseln
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          # KORREKTUR: Alle modernen Linux-Compiler-Bibliotheken explizit installieren
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl build-essential libsqlite3-dev lld

      - name: Install Buildozer and Cython core tools
        run: |
          pip install --upgrade pip setuptools wheel
          # Cython 0.29.x erzwingen, da neuere Versionen nicht mit alten Kivy-Rezepten kompatibel sind
          pip install "Cython>=0.29,<3.0" buildozer

      - name: Build Android APK
        run: |
          # Löscht alle potenziell störenden Systemvariablen von GitHub
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          
          # Compiler anweisen, Warnungen nicht als Fehler zu werten (-fcommon)
          export CFLAGS="-O2 -fcommon"
          export CXXFLAGS="-O2 -fcommon"
          
          # Startet den Build isoliert
          buildozer android debug
