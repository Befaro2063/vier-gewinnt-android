name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl build-essential libsqlite3-dev lld libjpeg-dev libtool-bin

      - name: Install Buildozer and Cython core tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython>=0.29,<3.0" buildozer

      - name: Build Android APK
        run: |
          # 1. Radikale Bereinigung
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # 2. Umgebungsvariablen säubern
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          
          # FIX: Zwingt Autoconf, die fehlenden Libtool-M4-Makros im System zu finden
          export AC_LOCAL_FLAGS="-I /usr/share/aclocal"
          
          # Compiler-Flags für stabilen C-Build setzen
          export CFLAGS="-O2 -fcommon"
          export CXXFLAGS="-O2 -fcommon"
          
          # Startet den Build
          buildozer android debug
