name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl build-essential

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      - name: Build Android APK
        run: |
          # Löscht alle potenziell störenden Systemvariablen radikal
          unset ANDROID_HOME
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          
          # Bereinigt alte, eingefrorene NDK-Reste im Arbeitsverzeichnis
          rm -rf .buildozer/android/platform/android-ndk-r28c
          
          # Startet den Build
          buildozer android debug
