name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. KORRIGIERT: Android SDK mit korrekten, aktuellen Parametern installieren
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
          packages: 'build-tools;34.0.0 platforms;android-34 platform-tools tools ndk;25.2.9519653'

      # 2. System-Abhängigkeiten installieren (inklusive aidl)
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev automake gettext aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython buildozer

      # 3. Sicherheits-Bypass: Kopiert alle Lizenzen direkt in das Buildozer-Verzeichnis
      - name: Sync Android Licenses to Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          if [ -d "$ANDROID_HOME/licenses" ]; then
            cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          fi

      # 4. Build ausführen und globale Pfade erzwingen
      - name: Build Android APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VierGewinnt-APK
          path: bin/*.apk
